<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览器 - PlainApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .browser-toolbar {
            background: #2196F3;
            color: white;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .nav-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .address-bar {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 0 15px;
        }
        
        .address-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
            padding: 8px 0;
        }
        
        .address-bar input::placeholder {
            color: rgba(255,255,255,0.7);
        }
        
        .security-icon {
            margin-right: 10px;
            font-size: 14px;
        }
        
        .browser-content {
            flex: 1;
            position: relative;
            background: white;
        }
        
        .browser-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #2196F3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .downloads-panel {
            position: fixed;
            right: -350px;
            top: 0;
            bottom: 0;
            width: 350px;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            transition: right 0.3s;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        
        .downloads-panel.open {
            right: 0;
        }
        
        .downloads-header {
            padding: 15px;
            background: #2196F3;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .downloads-header h3 {
            font-size: 16px;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .downloads-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .download-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            gap: 12px;
        }
        
        .download-icon {
            width: 40px;
            height: 40px;
            background: #e3f2fd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .download-info {
            flex: 1;
        }
        
        .download-name {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .download-progress {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .download-progress-bar {
            height: 100%;
            background: #2196F3;
            transition: width 0.3s;
        }
        
        .download-status {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .settings-panel {
            position: fixed;
            right: -350px;
            top: 0;
            bottom: 0;
            width: 350px;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            transition: right 0.3s;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        
        .settings-panel.open {
            right: 0;
        }
        
        .settings-header {
            padding: 15px;
            background: #2196F3;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .settings-header h3 {
            font-size: 16px;
        }
        
        .settings-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .setting-item {
            margin-bottom: 20px;
        }
        
        .setting-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }
        
        .setting-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .setting-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            display: none;
        }
        
        .overlay.show {
            display: block;
        }
        
        .menu-bar {
            display: flex;
            gap: 10px;
        }
        
        .menu-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .menu-btn:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="browser-toolbar">
        <div class="menu-bar">
            <button class="nav-btn" id="backBtn" title="后退">←</button>
            <button class="nav-btn" id="forwardBtn" title="前进">→</button>
            <button class="nav-btn" id="refreshBtn" title="刷新">↻</button>
            <button class="nav-btn" id="homeBtn" title="主页">⌂</button>
        </div>
        <div class="address-bar">
            <span class="security-icon" id="securityIcon">🔒</span>
            <input type="text" id="urlInput" placeholder="输入网址或搜索内容..." />
            <button class="nav-btn" id="goBtn" style="background: transparent; width: 30px; height: 30px;">→</button>
        </div>
        <div class="menu-bar">
            <button class="menu-btn" id="downloadsBtn">↓ 下载</button>
            <button class="menu-btn" id="settingsBtn">⚙ 设置</button>
        </div>
    </div>
    
    <div class="browser-content">
        <div class="loading-overlay" id="loadingOverlay" style="display: none;">
            <div class="loading-spinner"></div>
        </div>
        <iframe class="browser-frame" id="browserFrame" src="about:blank"></iframe>
    </div>
    
    <div class="overlay" id="overlay"></div>
    
    <div class="downloads-panel" id="downloadsPanel">
        <div class="downloads-header">
            <h3>下载管理</h3>
            <button class="close-btn" id="closeDownloadsBtn">×</button>
        </div>
        <div class="downloads-list" id="downloadsList">
            <div class="download-item">
                <div class="download-icon">📄</div>
                <div class="download-info">
                    <div class="download-name">示例文件.pdf</div>
                    <div class="download-progress">
                        <div class="download-progress-bar" style="width: 0%"></div>
                    </div>
                    <div class="download-status">暂无下载</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h3>浏览器设置</h3>
            <button class="close-btn" id="closeSettingsBtn">×</button>
        </div>
        <div class="settings-content">
            <div class="setting-item">
                <label class="setting-label">主页</label>
                <input type="text" class="setting-input" id="homepageInput" value="https://www.baidu.com" />
            </div>
            <div class="setting-item">
                <label class="setting-label">搜索引擎</label>
                <select class="setting-select" id="searchEngineSelect">
                    <option value="https://www.baidu.com/s?wd=">百度</option>
                    <option value="https://www.google.com/search?q=">Google</option>
                    <option value="https://www.bing.com/search?q=">Bing</option>
                </select>
            </div>
            <div class="setting-item">
                <label class="setting-label">下载保存路径</label>
                <select class="setting-select" id="downloadPathSelect">
                    <option value="/storage/emulated/0/Download">下载文件夹</option>
                    <option value="/storage/emulated/0/Documents">文档文件夹</option>
                    <option value="/storage/emulated/0/Pictures">图片文件夹</option>
                </select>
            </div>
            <div class="setting-item">
                <label class="setting-label">隐私模式</label>
                <select class="setting-select" id="privateModeSelect">
                    <option value="off">关闭</option>
                    <option value="on">开启</option>
                </select>
            </div>
            <div class="setting-item">
                <button class="menu-btn" id="clearCacheBtn" style="width: 100%; background: #f5f5f5; color: #333;">清除缓存</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api/browser';
        
        const backBtn = document.getElementById('backBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const homeBtn = document.getElementById('homeBtn');
        const urlInput = document.getElementById('urlInput');
        const goBtn = document.getElementById('goBtn');
        const browserFrame = document.getElementById('browserFrame');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const securityIcon = document.getElementById('securityIcon');
        const downloadsBtn = document.getElementById('downloadsBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const downloadsPanel = document.getElementById('downloadsPanel');
        const settingsPanel = document.getElementById('settingsPanel');
        const overlay = document.getElementById('overlay');
        const closeDownloadsBtn = document.getElementById('closeDownloadsBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        
        let history = [];
        let historyIndex = -1;
        let currentUrl = '';
        let progressPollInterval = null;
        let isDownloadsPanelOpen = false;
        
        function startProgressPolling() {
            if (progressPollInterval) return;
            loadDownloads();
            progressPollInterval = setInterval(() => {
                if (isDownloadsPanelOpen) {
                    loadDownloads();
                }
            }, 1000);
        }
        
        function stopProgressPolling() {
            if (progressPollInterval) {
                clearInterval(progressPollInterval);
                progressPollInterval = null;
            }
        }
        
        function loadSettings() {
            const settings = JSON.parse(localStorage.getItem('browserSettings') || '{}');
            document.getElementById('homepageInput').value = settings.homepage || 'https://www.baidu.com';
            document.getElementById('searchEngineSelect').value = settings.searchEngine || 'https://www.baidu.com/s?wd=';
            document.getElementById('downloadPathSelect').value = settings.downloadPath || '/storage/emulated/0/Download';
            document.getElementById('privateModeSelect').value = settings.privateMode || 'off';
        }
        
        function saveSettings() {
            const settings = {
                homepage: document.getElementById('homepageInput').value,
                searchEngine: document.getElementById('searchEngineSelect').value,
                downloadPath: document.getElementById('downloadPathSelect').value,
                privateMode: document.getElementById('privateModeSelect').value
            };
            localStorage.setItem('browserSettings', JSON.stringify(settings));
        }
        
        function isValidUrl(string) {
            const urlPattern = /^https?:\/\/[^\s/$.?#].[^\s]*$/i;
            return urlPattern.test(string);
        }
        
        function navigate(url) {
            let targetUrl = url.trim();
            
            if (!targetUrl) {
                const settings = JSON.parse(localStorage.getItem('browserSettings') || '{}');
                targetUrl = settings.homepage || 'https://www.baidu.com';
            }
            
            if (!isValidUrl(targetUrl)) {
                const settings = JSON.parse(localStorage.getItem('browserSettings') || '{}');
                targetUrl = settings.searchEngine + encodeURIComponent(targetUrl);
            }
            
            loadingOverlay.style.display = 'flex';
            currentUrl = targetUrl;
            urlInput.value = targetUrl;
            
            if (targetUrl.startsWith('https://')) {
                securityIcon.textContent = '🔒';
            } else {
                securityIcon.textContent = '🔓';
            }
            
            if (historyIndex < history.length - 1) {
                history = history.slice(0, historyIndex + 1);
            }
            history.push(targetUrl);
            historyIndex = history.length - 1;
            
            updateNavButtons();
            
            const proxyUrl = API_BASE + '/proxy?url=' + encodeURIComponent(targetUrl);
            browserFrame.src = proxyUrl;
        }
        
        function updateNavButtons() {
            backBtn.disabled = historyIndex <= 0;
            forwardBtn.disabled = historyIndex >= history.length - 1;
        }
        
        backBtn.addEventListener('click', () => {
            if (historyIndex > 0) {
                historyIndex--;
                const url = history[historyIndex];
                urlInput.value = url;
                browserFrame.src = API_BASE + '/proxy?url=' + encodeURIComponent(url);
                updateNavButtons();
            }
        });
        
        forwardBtn.addEventListener('click', () => {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                const url = history[historyIndex];
                urlInput.value = url;
                browserFrame.src = API_BASE + '/proxy?url=' + encodeURIComponent(url);
                updateNavButtons();
            }
        });
        
        refreshBtn.addEventListener('click', () => {
            if (currentUrl) {
                browserFrame.src = API_BASE + '/proxy?url=' + encodeURIComponent(currentUrl) + '&t=' + Date.now();
            }
        });
        
        homeBtn.addEventListener('click', () => {
            const settings = JSON.parse(localStorage.getItem('browserSettings') || '{}');
            navigate(settings.homepage || 'https://www.baidu.com');
        });
        
        goBtn.addEventListener('click', () => {
            navigate(urlInput.value);
        });
        
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                navigate(urlInput.value);
            }
        });
        
        browserFrame.addEventListener('load', () => {
            loadingOverlay.style.display = 'none';
        });
        
        downloadsBtn.addEventListener('click', () => {
            downloadsPanel.classList.add('open');
            overlay.classList.add('show');
            isDownloadsPanelOpen = true;
            startProgressPolling();
        });
        
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.add('open');
            overlay.classList.add('show');
            loadSettings();
        });
        
        closeDownloadsBtn.addEventListener('click', () => {
            downloadsPanel.classList.remove('open');
            overlay.classList.remove('show');
            isDownloadsPanelOpen = false;
            stopProgressPolling();
        });
        
        closeSettingsBtn.addEventListener('click', () => {
            settingsPanel.classList.remove('open');
            overlay.classList.remove('show');
            saveSettings();
        });
        
        overlay.addEventListener('click', () => {
            downloadsPanel.classList.remove('open');
            settingsPanel.classList.remove('open');
            overlay.classList.remove('show');
            isDownloadsPanelOpen = false;
            stopProgressPolling();
            saveSettings();
        });
        
        window.addEventListener('beforeunload', () => {
            stopProgressPolling();
        });
        
        document.getElementById('clearCacheBtn').addEventListener('click', async () => {
            try {
                const response = await fetch(API_BASE + '/clearCache', {
                    method: 'POST'
                });
                const result = await response.json();
                if (result.success) {
                    alert('缓存已清除');
                } else {
                    alert('清除缓存失败');
                }
            } catch (error) {
                console.error('清除缓存失败:', error);
                alert('清除缓存失败');
            }
        });
        
        async function loadDownloads() {
            try {
                const response = await fetch(API_BASE + '/downloads');
                const downloads = await response.json();
                renderDownloads(downloads);
            } catch (error) {
                console.error('加载下载列表失败:', error);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function renderDownloads(downloads) {
            const downloadsList = document.getElementById('downloadsList');
            downloadsList.innerHTML = '';
            
            if (!downloads || downloads.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.style.textAlign = 'center';
                emptyDiv.style.padding = '40px';
                emptyDiv.style.color = '#999';
                
                const iconDiv = document.createElement('div');
                iconDiv.style.fontSize = '48px';
                iconDiv.style.marginBottom = '10px';
                iconDiv.textContent = '📥';
                emptyDiv.appendChild(iconDiv);
                
                const textDiv = document.createElement('div');
                textDiv.textContent = '暂无下载记录';
                emptyDiv.appendChild(textDiv);
                
                downloadsList.appendChild(emptyDiv);
                return;
            }
            
            downloads.forEach(download => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'download-item';
                
                const iconDiv = document.createElement('div');
                iconDiv.className = 'download-icon';
                iconDiv.textContent = getFileIcon(download.filename);
                itemDiv.appendChild(iconDiv);
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'download-info';
                
                const nameDiv = document.createElement('div');
                nameDiv.className = 'download-name';
                nameDiv.textContent = download.filename;
                infoDiv.appendChild(nameDiv);
                
                const progressDiv = document.createElement('div');
                progressDiv.className = 'download-progress';
                
                const progressBar = document.createElement('div');
                progressBar.className = 'download-progress-bar';
                progressBar.style.width = (download.progress || 0) + '%';
                progressDiv.appendChild(progressBar);
                infoDiv.appendChild(progressDiv);
                
                const statusDiv = document.createElement('div');
                statusDiv.className = 'download-status';
                statusDiv.textContent = download.status + ' - ' + formatFileSize(download.size);
                infoDiv.appendChild(statusDiv);
                
                itemDiv.appendChild(infoDiv);
                downloadsList.appendChild(itemDiv);
            });
        }
        
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                pdf: '📕',
                doc: '📘', docx: '📘',
                xls: '📗', xlsx: '📗',
                ppt: '📙', pptx: '📙',
                zip: '📦', rar: '📦', '7z': '📦',
                jpg: '🖼', jpeg: '🖼', png: '🖼', gif: '🖼',
                mp3: '🎵', wav: '🎵', flac: '🎵',
                mp4: '🎬', avi: '🎬', mkv: '🎬',
                apk: '📱',
                txt: '📝'
            };
            return icons[ext] || '📄';
        }
        
        function formatFileSize(bytes) {
            if (!bytes) return '未知大小';
            const units = ['B', 'KB', 'MB', 'GB'];
            let size = bytes;
            let unitIndex = 0;
            while (size >= 1024 && unitIndex < units.length - 1) {
                size /= 1024;
                unitIndex++;
            }
            return size.toFixed(2) + ' ' + units[unitIndex];
        }
        
        window.addEventListener('message', async (event) => {
            if (event.data.type === 'download') {
                const downloadData = event.data;
                try {
                    const response = await fetch(API_BASE + '/download', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            url: downloadData.url,
                            filename: downloadData.filename,
                            mimeType: downloadData.mimeType
                        })
                    });
                    const result = await response.json();
                    if (result.success) {
                        loadDownloads();
                    } else {
                        console.error('下载失败:', result.error);
                    }
                } catch (error) {
                    console.error('下载请求失败:', error);
                }
            }
        });
        
        loadSettings();
        navigate('');
    </script>
</body>
</html>
