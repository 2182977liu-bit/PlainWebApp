<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机NAS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px; }
        h1 { font-size: 2em; margin-bottom: 16px; color: #667eea; }
        p { color: #666; font-size: 1.1em; margin-bottom: 24px; }
        .status { display: inline-block; padding: 8px 20px; border-radius: 20px; background: #e8f5e9; color: #2e7d32; font-size: 0.9em; }
        .api-test { margin-top: 32px; text-align: left; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        .api-test h3 { margin-bottom: 12px; }
        .api-test button { padding: 8px 16px; margin: 4px; border: none; border-radius: 6px; background: #667eea; color: white; cursor: pointer; }
        .api-test button:hover { background: #5a6fd6; }
        .api-test pre { background: #f8f9fa; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85em; margin-top: 8px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 手机NAS</h1>
        <p>通过浏览器管理你的手机</p>
        <span class="status">● 服务器运行中</span>
        <div class="api-test">
            <h3>API 测试</h3>
            <button onclick="testSettings()">获取设置</button>
            <button onclick="testDownloads()">获取下载列表</button>
            <pre id="result">点击按钮测试 API...</pre>
        </div>
    </div>
    <script>
        async function testSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('result').textContent = 'Error: ' + e.message;
            }
        }
        async function testDownloads() {
            try {
                const res = await fetch('/api/downloads');
                const data = await res.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('result').textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
